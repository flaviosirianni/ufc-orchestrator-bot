# Bot Factory Nginx template (subdominios)
# Ajustar dominios/certificados y puertos segun /etc/bot-factory/*.env

upstream bot_factory_billing {
  server 127.0.0.1:3200;
}

upstream bot_factory_ufc {
  server 127.0.0.1:3301;
}

upstream bot_factory_nutrition {
  server 127.0.0.1:3302;
}

upstream bot_factory_medical_reader {
  server 127.0.0.1:3303;
}

server {
  listen 443 ssl http2;
  server_name billing.example.com;

  client_max_body_size 10m;

  location / {
    proxy_pass http://bot_factory_billing;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name ufc.example.com;

  client_max_body_size 30m;

  location / {
    proxy_pass http://bot_factory_ufc;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name nutrition.example.com;

  client_max_body_size 30m;

  location / {
    proxy_pass http://bot_factory_nutrition;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name medical-reader.example.com;

  client_max_body_size 30m;

  location / {
    proxy_pass http://bot_factory_medical_reader;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
